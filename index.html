<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secrets of Lerma</title>
    <style>
      html, body { margin:0; padding:0; background:#0b1020; overflow:hidden; }

      /* ── Login Screen ── */
      #login-screen {
        position: fixed; inset: 0; z-index: 100;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0b1020;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #cbd5e1;
      }
      #login-screen h1 {
        font-size: 2rem; font-weight: 800;
        color: #a3e635; letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
      }
      #login-screen p {
        font-size: 0.9rem; color: #64748b;
        margin-bottom: 2rem;
      }
      #btn-google {
        display: flex; align-items: center; gap: 0.75rem;
        background: #fff; color: #1e293b;
        border: none; border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-size: 1rem; font-weight: 600;
        cursor: pointer; transition: opacity 0.2s;
      }
      #btn-google:hover { opacity: 0.85; }
      #btn-google img { width: 20px; height: 20px; }
      #login-error {
        margin-top: 1rem; font-size: 0.85rem;
        color: #f87171; display: none;
      }

      /* ── In-game UI ── */
      #ui {
        position: fixed; left: 12px; top: 10px; z-index: 5;
        color: #cbd5e1;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 14px; opacity: 0.95;
        display: none;
      }
      #ui b { color: #e2e8f0; }
      #btn-logout {
        margin-top: 8px; padding: 4px 10px;
        background: #1e293b; color: #94a3b8;
        border: 1px solid #334155; border-radius: 6px;
        font-size: 12px; cursor: pointer;
      }
      #btn-logout:hover { background: #334155; }
    </style>
  </head>
  <body>

    <!-- ── Login Screen ── -->
    <div id="login-screen">
      <h1>🪨 Secrets of Lerma</h1>
      <p>A living world built from the stories of Naga City</p>
      <button id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
      <div id="login-error">Login failed. Please try again.</div>
    </div>

    <!-- ── In-game UI ── -->
    <div id="ui">
      <b>Secrets of Lerma</b><br />
      <span id="ui-name"></span><br />
      <button id="btn-logout">Log out</button>
    </div>

    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>

    <!-- Firebase -->
    <script type="module">
      import { initializeApp }        from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                       from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      // 🔑 Firebase config
      const firebaseConfig = {
        apiKey:            "AIzaSyDVq6qM2duD5t0DpqOXjHJKJhwkO_qrhng",
        authDomain:        "secretsoflerma.firebaseapp.com",
        projectId:         "secretsoflerma",
        storageBucket:     "secretsoflerma.firebasestorage.app",
        messagingSenderId: "489065413195",
        appId:             "1:489065413195:web:d92edc00a5857428c3abce"
      };

      const app      = initializeApp(firebaseConfig);
      const auth     = getAuth(app);
      const provider = new GoogleAuthProvider();

      const loginScreen = document.getElementById("login-screen");
      const gameUI      = document.getElementById("ui");
      const uiName      = document.getElementById("ui-name");
      const btnGoogle   = document.getElementById("btn-google");
      const btnLogout   = document.getElementById("btn-logout");
      const loginError  = document.getElementById("login-error");

      // Cache buster — bump this when you want browsers to reload JS files
      const V = Date.now();

      // ── Auth state listener ──
      onAuthStateChanged(auth, (user) => {
        if (user) {
          loginScreen.style.display  = "none";
          gameUI.style.display       = "block";
          uiName.textContent         = user.displayName || user.email;

          // Set identity BEFORE loading game scripts
          window.LERMA_USER = {
            uid:         user.uid,
            displayName: user.displayName || user.email,
            photoURL:    user.photoURL
          };

          if (!window.LERMA_GAME_STARTED) {
            window.LERMA_GAME_STARTED = true;
            // Load scripts with cache-busting version param
            const s = document.createElement("script");
            s.src = `./net.js?v=${V}`;
            document.body.appendChild(s);
            s.onload = () => {
              const m = document.createElement("script");
              m.src = `./main.js?v=${V}`;
              document.body.appendChild(m);
            };
          }
        } else {
          loginScreen.style.display = "flex";
          gameUI.style.display      = "none";
        }
      });

      // ── Google Sign-in ──
      btnGoogle.addEventListener("click", async () => {
        try {
          loginError.style.display = "none";
          await signInWithPopup(auth, provider);
        } catch (e) {
          console.error(e);
          loginError.style.display = "block";
        }
      });

      // ── Logout ──
      btnLogout.addEventListener("click", () => signOut(auth));
    </script>

  </body>
</html>
