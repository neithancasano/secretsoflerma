<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Secrets of Lerma</title>
    <style>
      html, body { margin:0; padding:0; background:#0b1020; overflow:hidden; }
      #login-screen { position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b1020;font-family:system-ui,sans-serif;color:#cbd5e1; }
      #login-screen h1 { font-size:2rem;font-weight:800;color:#a3e635;letter-spacing:0.05em;margin-bottom:0.25rem; }
      #login-screen p  { font-size:0.9rem;color:#64748b;margin-bottom:2rem; }
      #btn-google { display:flex;align-items:center;gap:0.75rem;background:#fff;color:#1e293b;border:none;border-radius:8px;padding:0.75rem 1.5rem;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity 0.2s; }
      #btn-google:hover { opacity:0.85; }
      #btn-google img { width:20px;height:20px; }
      #login-error { margin-top:1rem;font-size:0.85rem;color:#f87171;display:none; }
      #ui { position:fixed;left:12px;top:10px;z-index:5;color:#cbd5e1;font-family:system-ui,sans-serif;font-size:14px;opacity:0.95;display:none; }
      #ui b { color:#e2e8f0; }
      #btn-logout { margin-top:8px;padding:4px 10px;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:6px;font-size:12px;cursor:pointer; }
      #btn-logout:hover { background:#334155; }
      #btn-stats { margin-top:4px;padding:4px 10px;background:#1e293b;color:#a3e635;border:1px solid #334155;border-radius:6px;font-size:12px;cursor:pointer;display:block; }
      #btn-stats:hover { background:#334155; }
      #stat-window { position:fixed;top:60px;left:12px;z-index:20;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 16px;width:260px;font-family:system-ui,sans-serif;font-size:12px;color:#cbd5e1;display:none; }
      #stat-window h3 { margin:0 0 8px 0;font-size:13px;color:#a3e635;border-bottom:1px solid #1e293b;padding-bottom:6px; }
      .stat-row { display:flex;align-items:center;justify-content:space-between;margin:4px 0; }
      .stat-label { color:#94a3b8;width:36px; }
      .stat-val   { color:#e2e8f0;font-weight:600;width:28px;text-align:center; }
      .stat-btn { background:#1e40af;color:#fff;border:none;border-radius:4px;width:20px;height:20px;font-size:14px;cursor:pointer;line-height:1; }
      .stat-btn:hover { background:#2563eb; }
      .stat-btn:disabled { background:#1e293b;color:#475569;cursor:not-allowed; }
      .stat-cost { color:#64748b;font-size:10px; }
      .derived-row { display:flex;justify-content:space-between;margin:2px 0;color:#64748b; }
      .derived-row span:last-child { color:#94a3b8; }
      #stat-points-left { color:#facc15;font-weight:700; }
      .exp-bar-wrap { margin-top:8px; }
      .exp-bar-bg { background:#1e293b;border-radius:3px;height:6px;overflow:hidden;margin-top:3px; }
      #exp-bar-fill { height:100%;background:#a3e635;border-radius:3px;transition:width 0.3s; }
      #save-indicator { font-size:10px;color:#4ade80;margin-top:6px;opacity:0;transition:opacity 0.3s; }
    </style>
  </head>
  <body>

    <div id="login-screen">
      <h1>🪨 Secrets of Lerma</h1>
      <p>A living world built from the stories of Naga City</p>
      <button id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
      <div id="login-error">Login failed. Please try again.</div>
    </div>

    <div id="ui">
      <b>Secrets of Lerma</b><br />
      <span id="ui-name"></span><br />
      <button id="btn-stats">📊 Stats (S)</button>
      <button id="btn-logout">Log out</button>
    </div>

    <div id="stat-window">
      <h3>📊 Character Stats — <span id="sw-name"></span></h3>
      <div style="margin-bottom:6px;color:#94a3b8">
        Level <span id="sw-level" style="color:#a3e635;font-weight:700">1</span>
        &nbsp;&nbsp; Points: <span id="stat-points-left">0</span>
      </div>
      <div class="exp-bar-wrap">
        <span style="color:#64748b;font-size:10px">EXP: <span id="sw-exp">0</span> / <span id="sw-exp-next">10</span></span>
        <div class="exp-bar-bg"><div id="exp-bar-fill" style="width:0%"></div></div>
      </div>
      <div style="margin:10px 0 4px;color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:0.05em">Base Stats</div>
      <div id="stat-rows"></div>
      <div style="margin:10px 0 4px;color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:0.05em">Derived Stats</div>
      <div id="derived-rows"></div>
      <div id="save-indicator">✓ Saved</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>

    <script type="module">
      import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                 from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
      import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
                                 from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey:            "AIzaSyDVq6qM2duD5t0DpqOXjHJKJhwkO_qrhng",
        authDomain:        "secretsoflerma.firebaseapp.com",
        projectId:         "secretsoflerma",
        storageBucket:     "secretsoflerma.firebasestorage.app",
        messagingSenderId: "489065413195",
        appId:             "1:489065413195:web:d92edc00a5857428c3abce"
      };

      const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app), provider=new GoogleAuthProvider();
      const loginScreen=document.getElementById("login-screen"), gameUI=document.getElementById("ui");
      const uiName=document.getElementById("ui-name"), btnGoogle=document.getElementById("btn-google");
      const btnLogout=document.getElementById("btn-logout"), btnStats=document.getElementById("btn-stats");
      const statWindow=document.getElementById("stat-window"), loginError=document.getElementById("login-error");
      const saveIndicator=document.getElementById("save-indicator");
      const V=Date.now();

      btnStats.addEventListener("click",()=>{statWindow.style.display=statWindow.style.display==="none"?"block":"none";});
      document.addEventListener("keydown",(e)=>{if(e.key==="s"||e.key==="S")statWindow.style.display=statWindow.style.display==="none"?"block":"none";});

      // ── Save position + zone ──
      window.LERMA_SAVE_POS = async (x, y, zoneId) => {
        const user=auth.currentUser; if(!user)return;
        try {
          await setDoc(doc(db,"players",user.uid),{
            displayName:user.displayName||user.email,
            x, y, zoneId:zoneId||'lerma', lastSeen:serverTimestamp()
          },{merge:true});
        } catch(e){console.warn("[LERMA] save pos failed",e);}
      };

      // ── Save respawn point ──
      window.LERMA_SAVE_RESPAWN = async (zone, x, y) => {
        const user=auth.currentUser; if(!user)return;
        try {
          await setDoc(doc(db,"players",user.uid),{respawnZone:zone,respawnX:x,respawnY:y},{merge:true});
        } catch(e){console.warn("[LERMA] save respawn failed",e);}
      };

      // ── Save stats throttled ──
      let lastStatSaveAt=0, pendingStatSave=null;
      window.LERMA_SAVE_STATS = async (stats) => {
        const user=auth.currentUser; if(!user||!stats)return;
        window._latestStats=stats;
        const now=Date.now();
        if(now-lastStatSaveAt<5000){
          if(!pendingStatSave)pendingStatSave=setTimeout(()=>{pendingStatSave=null;window.LERMA_SAVE_STATS(window._latestStats);},5000-(now-lastStatSaveAt));
          return;
        }
        lastStatSaveAt=now;
        try {
          await setDoc(doc(db,"players",user.uid),{
            stats:{level:stats.level,exp:stats.exp,statPoints:stats.statPoints,str:stats.str,agi:stats.agi,vit:stats.vit,int:stats.int,dex:stats.dex,luk:stats.luk}
          },{merge:true});
          saveIndicator.style.opacity='1';
          setTimeout(()=>{saveIndicator.style.opacity='0';},1500);
        } catch(e){console.warn("[LERMA] save stats failed",e);}
      };

      setInterval(()=>{if(window._latestStats)window.LERMA_SAVE_STATS(window._latestStats);},30000);
      window.addEventListener("beforeunload",()=>{
        const user=auth.currentUser; if(!user||!window._latestStats)return;
        const s=window._latestStats;
        try{setDoc(doc(db,"players",user.uid),{stats:{level:s.level,exp:s.exp,statPoints:s.statPoints,str:s.str,agi:s.agi,vit:s.vit,int:s.int,dex:s.dex,luk:s.luk}},{merge:true});}catch(e){}
      });

      onAuthStateChanged(auth, async (user) => {
        if(user){
          loginScreen.style.display="none"; gameUI.style.display="block";
          uiName.textContent=user.displayName||user.email;
          document.getElementById("sw-name").textContent=user.displayName||user.email;

          let savedX=null,savedY=null,savedStats=null,savedZone=null,respawnZone=null,respawnX=null,respawnY=null;
          try{
            const snap=await getDoc(doc(db,"players",user.uid));
            if(snap.exists()){
              const data=snap.data();
              savedX=data.x??null; savedY=data.y??null;
              savedZone=data.zoneId??null;
              savedStats=data.stats??null;
              respawnZone=data.respawnZone??null;
              respawnX=data.respawnX??null;
              respawnY=data.respawnY??null;
              console.log("[LERMA] Loaded from Firestore:", {savedZone, savedStats});
            }
          } catch(e){console.warn("[LERMA] load failed",e);}

          window.LERMA_USER={
            uid:user.uid, displayName:user.displayName||user.email,
            photoURL:user.photoURL,
            savedX, savedY, savedZone, savedStats,
            respawnZone, respawnX, respawnY,
          };

          if(!window.LERMA_GAME_STARTED){
            window.LERMA_GAME_STARTED=true;
            const s=document.createElement("script"); s.src=`./net.js?v=${V}`; document.body.appendChild(s);
            s.onload=()=>{const m=document.createElement("script");m.src=`./main.js?v=${V}`;document.body.appendChild(m);};
          }
        } else {
          loginScreen.style.display="flex"; gameUI.style.display="none";
        }
      });

      btnGoogle.addEventListener("click",async()=>{try{loginError.style.display="none";await signInWithPopup(auth,provider);}catch(e){console.error(e);loginError.style.display="block";}});
      btnLogout.addEventListener("click",()=>signOut(auth));
    </script>
  </body>
</html>
